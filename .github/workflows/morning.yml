name: "Miracle Morning Bot"

on:
  schedule:
    - cron: '20 20 * * *'         # 05:20 KST → JJ박 코드 발송
    - cron: '50 21 * * *'         # 06:50 KST → 리안 코드 발송
    - cron: '*/5 20-23 * * *'     # 05:00~08:55 KST → 5분마다 체크
    - cron: '*/5 0 * * *'         # 09:00~09:55 KST → 마감 체크
  workflow_dispatch:
    inputs:
      action:
        description: '실행할 작업'
        required: true
        default: 'check'
        type: choice
        options:
          - send-jjpark
          - send-rian
          - check

permissions:
  contents: write

jobs:
  bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Determine action
        id: action
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "action=${{ github.event.inputs.action }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            MIN=$(date -u +%M)
            echo "Current UTC: ${HOUR}:${MIN}"
            if [ "$HOUR" = "20" ] && [ "$MIN" -ge 18 ] && [ "$MIN" -le 22 ]; then
              echo "action=send-jjpark" >> $GITHUB_OUTPUT
            elif [ "$HOUR" = "21" ] && [ "$MIN" -ge 48 ] && [ "$MIN" -le 52 ]; then
              echo "action=send-rian" >> $GITHUB_OUTPUT
            else
              echo "action=check" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Send code (JJ박)
        if: steps.action.outputs.action == 'send-jjpark'
        run: node send-code.js jjpark
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}

      - name: Send code (리안)
        if: steps.action.outputs.action == 'send-rian'
        run: node send-code.js rian
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}

      - name: Check results
        if: steps.action.outputs.action == 'check'
        run: node check-results.js
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}

      # data/ 변경사항을 리포에 커밋 (GitHub Pages에서 읽을 수 있도록)
      - name: Commit data
        run: |
          git config user.name "miracle-bot"
          git config user.email "bot@miracle-morning"
          git add data/ || true
          git diff --staged --quiet || git commit -m "bot: update data $(date -u +%Y-%m-%dT%H:%M)"
          git push || true
